name: 每日更新基金数据

on:
  # 每天北京时间 20:00（UTC 12:00）执行，A股净值通常在18:00~22:00确认公布
  # QDII基金T+1更新，20:00基本可获取确认净值
  schedule:
    - cron: '0 12 * * *'
  # 支持手动触发
  workflow_dispatch:
  # 推送到 main 分支时也触发
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ===== 合并为单步：更新数据并部署 =====
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行数据抓取脚本
        run: python fetch_fund_data.py

      - name: 提交更新数据
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "自动更新基金数据+持仓快照 $(date +%Y-%m-%d)"
          # 先拉取远程最新更改，避免推送冲突
          git pull --rebase origin main
          git push origin main

      - name: 设置 Pages
        uses: actions/configure-pages@v5

      - name: 准备部署文件
        run: |
          mkdir -p site/data
          cp index.html site/
          # 只部署必要的数据文件（不包含原始交易记录）
          cp data/funds_data.json site/data/
          cp data/holdings_snapshot.json site/data/
          touch site/.nojekyll

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: 部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
