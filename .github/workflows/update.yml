name: 每日更新基金数据

on:
  # 每天北京时间 01:00（UTC 17:00）执行
  schedule:
    - cron: '0 17 * * *'
  # 支持手动触发
  workflow_dispatch:
  # 推送到 main 分支时也触发
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ===== 第一步：更新基金数据 =====
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行数据抓取脚本
        run: python fetch_fund_data.py

      - name: 提交更新数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/funds_data.json
          git diff --cached --quiet || git commit -m "自动更新基金数据 $(date +%Y-%m-%d)"
          git push

  # ===== 第二步：部署到 GitHub Pages =====
  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
