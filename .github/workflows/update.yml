name: 每日更新基金数据

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行数据抓取脚本
        run: python fetch_fund_data.py

      - name: 提交更新数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "自动更新基金数据+持仓快照 $(date +%Y-%m-%d)"
          # 先拉取远程最新更改，避免推送冲突
          git pull --rebase origin main
          git push origin main

      - name: 设置 Pages
        uses: actions/configure-pages@v5

      - name: 准备部署文件
        run: |
          mkdir -p site/data
          cp index.html site/
          cp -r data/* site/data/
          touch site/.nojekyll

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: 部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
