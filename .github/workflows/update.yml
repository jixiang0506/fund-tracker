name: 每日更新基金数据

on:
  # 每天北京时间 0:00、8:30、20:00、21:00、22:00、23:00 执行
  # 0:00  更新汇总（使用 T-1 数据）
  # 8:30  获取 T-1 净值 + 更新汇总
  # 20:00-23:00 获取 T 日净值（不更新汇总）
  schedule:
    - cron: '0 16 * * *'
    - cron: '30 0 * * *'
    - cron: '0 12-15 * * *'
  # 支持手动触发
  workflow_dispatch:
  # 推送到 main 分支时也触发
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ===== 合并为单步：更新数据并部署 =====
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 获取完整历史，便于 rebase

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行数据抓取脚本
        run: |
          python fetch_fund_data.py

      - name: 提交更新数据（通过 API 推送，避免 git 冲突）
        run: |
          set -e
          python push_to_github.py data/funds_data.json data/holdings_snapshot.json data/benchmark_index_data.json data/history_cache.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Pages
        uses: actions/configure-pages@v5

      - name: 准备部署文件
        run: |
          mkdir -p site/data
          cp index.html site/
          # 只部署必要的数据文件（不包含原始交易记录）
          cp data/funds_data.json site/data/
          cp data/holdings_snapshot.json site/data/
          cp data/benchmark_index_data.json site/data/
          touch site/.nojekyll

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: 部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
