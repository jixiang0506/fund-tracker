<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的基金收益追踪</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header .update-time {
            color: #666;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .label {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .change {
            font-size: 14px;
        }

        .positive {
            color: #f56c6c;
        }

        .negative {
            color: #67c23a;
        }

        .platform-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .platform-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .funds-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .funds-table th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            color: #666;
            font-weight: 600;
            font-size: 14px;
        }

        .funds-table td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .funds-table tr:hover {
            background: #f8f9fa;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 30px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .error {
            background: #fef0f0;
            color: #f56c6c;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .funds-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 我的基金收益追踪</h1>
            <div class="update-time" id="updateTime">加载中...</div>
        </div>

        <div id="content">
            <div class="loading">正在加载基金数据...</div>
        </div>
    </div>

    <script>
        let fundsData = null;

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data/funds_data.json?t=' + new Date().getTime());
                if (!response.ok) {
                    throw new Error('数据加载失败');
                }
                fundsData = await response.json();
                renderData();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        数据加载失败: ${error.message}<br>
                        请检查 data/funds_data.json 文件是否存在。
                    </div>
                `;
            }
        }

        // 渲染数据
        function renderData() {
            if (!fundsData) return;

            // 更新时间
            document.getElementById('updateTime').textContent = `最后更新: ${fundsData.update_time}`;

            // 计算总体统计
            let totalDailyReturn = 0;
            let totalCumulativeReturn = 0;
            let fundCount = 0;

            // 按平台组织数据
            const platforms = {};
            for (const platform in fundsData.funds) {
                platforms[platform] = fundsData.funds[platform];
                fundCount += platforms[platform].length;

                platforms[platform].forEach(fund => {
                    totalDailyReturn += fund.daily_return;
                    totalCumulativeReturn += fund.cumulative_return;
                });
            }

            // 渲染总体统计
            const avgDailyReturn = (totalDailyReturn / fundCount).toFixed(2);
            const avgCumulativeReturn = (totalCumulativeReturn / fundCount).toFixed(2);

            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label">持有基金数</div>
                        <div class="value">${fundCount}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">平均日收益率</div>
                        <div class="value ${avgDailyReturn >= 0 ? 'positive' : 'negative'}">${avgDailyReturn}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">平均累计收益率</div>
                        <div class="value ${avgCumulativeReturn >= 0 ? 'positive' : 'negative'}">${avgCumulativeReturn}%</div>
                    </div>
                </div>
            `;

            // 按平台渲染
            for (const platform in platforms) {
                html += renderPlatform(platform, platforms[platform]);
            }

            document.getElementById('content').innerHTML = html;

            // 渲染图表
            renderCharts();
        }

        // 渲染平台数据
        function renderPlatform(platformName, funds) {
            let html = `
                <div class="platform-section">
                    <div class="platform-title">${platformName}</div>
                    <table class="funds-table">
                        <thead>
                            <tr>
                                <th>基金代码</th>
                                <th>基金名称</th>
                                <th>最新净值</th>
                                <th>日收益率</th>
                                <th>累计收益率</th>
                                <th>净值日期</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            funds.forEach(fund => {
                const dailyClass = fund.daily_return >= 0 ? 'positive' : 'negative';
                const cumulativeClass = fund.cumulative_return >= 0 ? 'positive' : 'negative';

                html += `
                    <tr>
                        <td><strong>${fund.code}</strong></td>
                        <td>${fund.name}</td>
                        <td>${fund.current_nav.toFixed(4)}</td>
                        <td class="${dailyClass}">${fund.daily_return >= 0 ? '+' : ''}${fund.daily_return.toFixed(2)}%</td>
                        <td class="${cumulativeClass}">${fund.cumulative_return >= 0 ? '+' : ''}${fund.cumulative_return.toFixed(2)}%</td>
                        <td>${fund.nav_date}</td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                    <div class="chart-container">
                        <canvas id="chart-${platformName}"></canvas>
                    </div>
                </div>
            `;

            return html;
        }

        // 渲染图表
        function renderCharts() {
            for (const platform in fundsData.funds) {
                const funds = fundsData.funds[platform];
                const ctx = document.getElementById(`chart-${platform}`);

                if (!ctx) continue;

                // 准备数据
                const datasets = funds.map((fund, index) => {
                    const colors = [
                        'rgb(255, 99, 132)',
                        'rgb(54, 162, 235)',
                        'rgb(255, 206, 86)',
                        'rgb(75, 192, 192)',
                        'rgb(153, 102, 255)',
                        'rgb(255, 159, 64)'
                    ];

                    return {
                        label: `${fund.name} (${fund.code})`,
                        data: fund.history.map(h => h.nav),
                        borderColor: colors[index % colors.length],
                        backgroundColor: 'transparent',
                        tension: 0.1
                    };
                });

                // 使用第一个基金的历史日期
                const labels = funds[0].history.map(h => h.date);

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: '净值走势图'
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: false
                            }
                        }
                    }
                });
            }
        }

        // 页面加载时执行
        loadData();
    </script>
</body>
</html>
